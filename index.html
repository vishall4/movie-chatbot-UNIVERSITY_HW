<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineBot — Movie Recommendation Chatbot</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-deep: #0a0a0f;
    --bg-chat: #111118;
    --bg-bot: #1a1a25;
    --bg-user: #e84545;
    --text-primary: #f0eff4;
    --text-muted: #8a8998;
    --accent: #e84545;
    --accent-glow: rgba(232, 69, 69, 0.25);
    --gold: #f5c518;
    --surface: #1e1e2a;
    --border: rgba(255,255,255,0.06);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
  }

  /* Ambient background */
  body::before {
    content: '';
    position: fixed;
    top: -40%; left: -20%;
    width: 80vw; height: 80vw;
    background: radial-gradient(circle, rgba(232,69,69,0.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -30%; right: -15%;
    width: 60vw; height: 60vw;
    background: radial-gradient(circle, rgba(245,197,24,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 520px;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    padding: 20px 24px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(20px);
    background: rgba(10,10,15,0.8);
    flex-shrink: 0;
  }
  .header-icon {
    width: 46px; height: 46px;
    background: linear-gradient(135deg, var(--accent), #ff6b6b);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: 0 4px 20px var(--accent-glow);
  }
  .header-text h1 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.3px;
  }
  .header-text p {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .status-dot {
    width: 8px; height: 8px;
    background: #4ade80;
    border-radius: 50%;
    margin-left: auto;
    box-shadow: 0 0 8px rgba(74,222,128,0.5);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Chat area */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    scroll-behavior: smooth;
  }
  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Messages */
  .msg {
    max-width: 82%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 14.5px;
    line-height: 1.55;
    animation: msgIn 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    word-wrap: break-word;
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(12px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .msg.bot {
    background: var(--bg-bot);
    border: 1px solid var(--border);
    align-self: flex-start;
    border-bottom-left-radius: 6px;
  }
  .msg.user {
    background: linear-gradient(135deg, var(--accent), #d93636);
    align-self: flex-end;
    border-bottom-right-radius: 6px;
    color: #fff;
  }
  .msg.bot .bot-label {
    font-size: 11px;
    color: var(--accent);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 4px;
  }

  /* Quick reply buttons */
  .options-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-self: flex-start;
    max-width: 90%;
    animation: msgIn 0.35s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .opt-btn {
    padding: 9px 18px;
    border-radius: 100px;
    border: 1px solid rgba(232,69,69,0.35);
    background: rgba(232,69,69,0.08);
    color: var(--text-primary);
    font-size: 13.5px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .opt-btn:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    transform: translateY(-1px);
    box-shadow: 0 4px 16px var(--accent-glow);
  }

  /* Movie cards */
  .movie-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    margin-top: 4px;
    max-width: 82%;
    align-self: flex-start;
    animation: msgIn 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .movie-card .title-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 6px;
  }
  .movie-card .movie-title {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 700;
  }
  .movie-card .year {
    font-size: 12px;
    color: var(--text-muted);
  }
  .movie-card .rating {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 13px;
    color: var(--gold);
    font-weight: 700;
    margin-bottom: 8px;
  }
  .movie-card .rating .star { font-size: 14px; }
  .movie-card .desc {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
  }
  .movie-card .tags {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-top: 10px;
  }
  .movie-card .tag {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 100px;
    background: rgba(245,197,24,0.1);
    color: var(--gold);
    font-weight: 500;
  }

  /* Typing indicator */
  .typing {
    align-self: flex-start;
    display: flex;
    gap: 5px;
    padding: 14px 20px;
    background: var(--bg-bot);
    border: 1px solid var(--border);
    border-radius: 18px;
    border-bottom-left-radius: 6px;
    animation: msgIn 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .typing span {
    width: 7px; height: 7px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* Input bar */
  .input-bar {
    padding: 14px 16px 24px;
    border-top: 1px solid var(--border);
    backdrop-filter: blur(20px);
    background: rgba(10,10,15,0.85);
    display: flex;
    gap: 10px;
    align-items: center;
    flex-shrink: 0;
  }
  .input-bar input {
    flex: 1;
    padding: 12px 18px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-primary);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border 0.2s;
  }
  .input-bar input::placeholder { color: var(--text-muted); }
  .input-bar input:focus { border-color: rgba(232,69,69,0.5); }
  .input-bar button {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, var(--accent), #d93636);
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s, box-shadow 0.2s;
    flex-shrink: 0;
  }
  .input-bar button:hover {
    transform: scale(1.06);
    box-shadow: 0 4px 20px var(--accent-glow);
  }

  /* Restart button */
  .restart-btn {
    margin: 6px auto 0;
    padding: 8px 20px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    align-self: center;
    animation: msgIn 0.4s ease;
  }
  .restart-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  @media (max-width: 540px) {
    .app { max-width: 100%; }
    .msg { max-width: 88%; }
    .movie-card { max-width: 88%; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="header-icon">🎬</div>
    <div class="header-text">
      <h1>CineBot</h1>
      <p>Your personal movie recommender</p>
    </div>
    <div class="status-dot"></div>
  </div>

  <div class="chat-area" id="chat"></div>

  <div class="input-bar">
    <input type="text" id="userInput" placeholder="Type a message..." autocomplete="off" />
    <button id="sendBtn" onclick="handleFreeText()">➤</button>
  </div>
</div>

const chat = document.getElementById('chat');
const userInput = document.getElementById('userInput');

// ── Movie Database ──
const MOVIES = {

    ]
  },

    ],
    "intense": [

      { title:"There Will Be Blood", year:2007, rating:8.2, desc:"An oil prospector's relentless ambition leads to corruption and self-destruction.", tags:["Historical","Epic"] },
      { title:"Prisoners", year:2013, rating:8.1, desc:"A father takes justice into his own hands when his daughter goes missing.", tags:["Thriller","Mystery","Crime"] }
    ],
    "thought-provoking": [
      { title:"Interstellar", year:2014, rating:8.7, desc:"Explorers journey beyond the galaxy seeking a new home for humanity.", tags:["Sci-Fi","Adventure","Space"] },
      { title:"Eternal Sunshine of the Spotless Mind", year:2004, rating:8.3, desc:"A couple undergoes a procedure to erase each other from memory after a painful breakup.", tags:["Romance","Sci-Fi"] },

  },

    ],

    ],
    "thought-provoking": [
      { title:"Get Out", year:2017, rating:7.7, desc:"A young man uncovers disturbing secrets when visiting his girlfriend's seemingly liberal family.", tags:["Thriller","Social Commentary"] },

  "sci-fi": {

      { title:"Back to the Future", year:1985, rating:8.5, desc:"A teenager accidentally travels to 1955 and must fix the timeline to save his future.", tags:["Adventure","Comedy","Classic"] },
      { title:"Spider-Man: Into the Spider-Verse", year:2018, rating:8.4, desc:"A teen becomes Spider-Man and teams up with heroes from parallel dimensions.", tags:["Animation","Action","Superhero"] }
    ],
    "intense": [
      { title:"Blade Runner 2049", year:2017, rating:8.0, desc:"A blade runner uncovers a long-buried secret that threatens to destabilize society.", tags:["Thriller","Dystopian","Neo-Noir"] },

      { title:"Dune", year:2021, rating:8.0, desc:"A young noble navigates political intrigue and desert warfare on a dangerous planet.", tags:["Adventure","Epic","Fantasy"] }
    ],

};

// ── Chatbot State ──
let state = { step: 'greeting', genre: null, mood: null };

function scrollToBottom() {
  requestAnimationFrame(() => chat.scrollTop = chat.scrollHeight);
}

function addBotMsg(text) {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = `<div class="bot-label">CineBot</div>${text}`;
  chat.appendChild(div);
  scrollToBottom();
}

function addUserMsg(text) {
  const div = document.createElement('div');
  div.className = 'msg user';
  div.textContent = text;
  chat.appendChild(div);
  scrollToBottom();
}

function addOptions(options, callback) {
  const row = document.createElement('div');
  row.className = 'options-row';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt;
    btn.onclick = () => {
      row.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
      row.style.opacity = '0.4';
      row.style.pointerEvents = 'none';
      callback(opt);
    };
    row.appendChild(btn);
  });
  chat.appendChild(row);
  scrollToBottom();
}

function addMovieCard(movie) {
  const div = document.createElement('div');
  div.className = 'movie-card';
  div.innerHTML = `
    <div class="title-row">
      <span class="movie-title">${movie.title}</span>
      <span class="year">(${movie.year})</span>
    </div>
    <div class="rating"><span class="star">★</span> ${movie.rating}/10</div>
    <div class="desc">${movie.desc}</div>
    <div class="tags">${movie.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
  `;
  chat.appendChild(div);
  scrollToBottom();
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typing';
  div.innerHTML = '<span></span><span></span><span></span>';
  chat.appendChild(div);
  scrollToBottom();
}

function hideTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function addRestart() {
  const btn = document.createElement('button');
  btn.className = 'restart-btn';
  btn.textContent = '↻  Start Over';
  btn.onclick = () => {
    chat.innerHTML = '';
    state = { step: 'greeting', genre: null, mood: null };
    startChat();
  };
  chat.appendChild(btn);
  scrollToBottom();
}

function typingThen(fn, delay = 900) {
  showTyping();
  setTimeout(() => { hideTyping(); fn(); }, delay);
}

// ── Conversation Flow ──
function startChat() {
  typingThen(() => {
    addBotMsg("Hey there! 👋 I'm <strong>CineBot</strong>, your personal movie guide. I'll find the perfect movie for your mood right now.");
    setTimeout(() => {
      addBotMsg("What genre are you in the mood for?");
      setTimeout(() => {
        addOptions(["🎬 Action", "😂 Comedy", "🎭 Drama", "👻 Horror", "🚀 Sci-Fi"], handleGenre);
        state.step = 'genre';
      }, 300);
    }, 600);
  }, 700);
}

function handleGenre(choice) {
  addUserMsg(choice);
  const map = { "🎬 Action":"action", "😂 Comedy":"comedy", "🎭 Drama":"drama", "👻 Horror":"horror", "🚀 Sci-Fi":"sci-fi" };
  state.genre = map[choice] || 'action';
  state.step = 'mood';

  typingThen(() => {
    addBotMsg(`Great choice! And what kind of vibe are you looking for tonight?`);
    setTimeout(() => {
      addOptions(["😊 Feel-Good", "🔥 Intense", "🧠 Thought-Provoking"], handleMood);
    }, 300);
  });
}

function handleMood(choice) {
  addUserMsg(choice);
  const map = { "😊 Feel-Good":"feel-good", "🔥 Intense":"intense", "🧠 Thought-Provoking":"thought-provoking" };
  state.mood = map[choice] || 'feel-good';
  state.step = 'results';

  typingThen(() => {
    const movies = MOVIES[state.genre]?.[state.mood] || MOVIES.action["feel-good"];
    addBotMsg(`Here are my top 3 picks for you — ${state.genre} movies with a <strong>${state.mood}</strong> vibe:`);
    let delay = 400;
    movies.forEach((m, i) => {
      setTimeout(() => {
        addMovieCard(m);
        if (i === movies.length - 1) {
          setTimeout(() => {
            addBotMsg("Would you like to explore another genre, change the vibe, or are we good?");
            setTimeout(() => {
              addOptions(["🔄 Different Genre", "🎨 Different Vibe", "✅ I'm Good, Thanks!"], handleFollowUp);
            }, 300);
          }, 500);
        }
      }, delay * (i + 1));
    });
  }, 1100);
}

function handleFollowUp(choice) {
  addUserMsg(choice);

  if (choice === "🔄 Different Genre") {
    state.step = 'genre';
    typingThen(() => {
      addBotMsg("Alright, let's switch it up! Pick a genre:");
      setTimeout(() => {
        addOptions(["🎬 Action", "😂 Comedy", "🎭 Drama", "👻 Horror", "🚀 Sci-Fi"], handleGenre);
      }, 300);
    });
  } else if (choice === "🎨 Different Vibe") {
    state.step = 'mood';
    typingThen(() => {
      addBotMsg(`Staying with <strong>${state.genre}</strong> — pick a new vibe:`);
      setTimeout(() => {
        addOptions(["😊 Feel-Good", "🔥 Intense", "🧠 Thought-Provoking"], handleMood);
      }, 300);
    });
  } else {
    typingThen(() => {
      addBotMsg("Enjoy your movie night! 🍿 Feel free to come back anytime you need a recommendation.");
      setTimeout(() => addRestart(), 400);
    });
  }
}

// ── Free text handler ──
function handleFreeText() {
  const text = userInput.value.trim();
  if (!text) return;
  addUserMsg(text);
  userInput.value = '';

  const lower = text.toLowerCase();

  // Simple NLU
  const genreKeywords = { action:['action','adventure','fight','explosive'], comedy:['comedy','funny','laugh','humor','hilarious'], drama:['drama','emotional','serious','deep'], horror:['horror','scary','creepy','terrifying','spooky'], "sci-fi":['sci-fi','scifi','science fiction','space','futuristic','alien'] };
  const moodKeywords = { "feel-good":['feel good','feel-good','happy','light','fun','uplifting','cheerful','heartwarming'], intense:['intense','dark','gritty','heavy','thrilling','suspense'], "thought-provoking":['thought','think','mind','philosophical','cerebral','deep','meaningful','provocative'] };

  let detectedGenre = null, detectedMood = null;
  for (const [g, kws] of Object.entries(genreKeywords)) { if (kws.some(k => lower.includes(k))) { detectedGenre = g; break; } }
  for (const [m, kws] of Object.entries(moodKeywords)) { if (kws.some(k => lower.includes(k))) { detectedMood = m; break; } }

  if (lower.includes('hello') || lower.includes('hi') || lower.includes('hey') || lower.includes('start')) {
    typingThen(() => {
      addBotMsg("Hey! Let's find you a great movie. What genre are you feeling?");
      setTimeout(() => addOptions(["🎬 Action", "😂 Comedy", "🎭 Drama", "👻 Horror", "🚀 Sci-Fi"], handleGenre), 300);
    });
  } else if (detectedGenre && detectedMood) {
    state.genre = detectedGenre;
    state.mood = detectedMood;
    state.step = 'results';
    typingThen(() => {
      const movies = MOVIES[state.genre][state.mood];
      addBotMsg(`Got it — ${state.genre} + ${state.mood}. Here are my picks:`);
      let delay = 400;
      movies.forEach((m, i) => {
        setTimeout(() => {
          addMovieCard(m);
          if (i === movies.length - 1) {
            setTimeout(() => {
              addBotMsg("Want to explore more?");
              setTimeout(() => addOptions(["🔄 Different Genre", "🎨 Different Vibe", "✅ I'm Good, Thanks!"], handleFollowUp), 300);
            }, 500);
          }
        }, delay * (i + 1));
      });
    }, 1100);
  } else if (detectedGenre) {
    state.genre = detectedGenre;
    state.step = 'mood';
    typingThen(() => {
      addBotMsg(`Nice — ${detectedGenre}! What vibe tonight?`);
      setTimeout(() => addOptions(["😊 Feel-Good", "🔥 Intense", "🧠 Thought-Provoking"], handleMood), 300);
    });
  } else if (detectedMood) {
    state.mood = detectedMood;
    typingThen(() => {
      addBotMsg(`Love a ${detectedMood} movie! Which genre?`);
      setTimeout(() => addOptions(["🎬 Action", "😂 Comedy", "🎭 Drama", "👻 Horror", "🚀 Sci-Fi"], handleGenre), 300);
    });
  } else if (lower.includes('thank') || lower.includes('bye') || lower.includes('good')) {
    typingThen(() => {
      addBotMsg("You're welcome! Enjoy your movie night 🍿");
      setTimeout(() => addRestart(), 400);
    });
  } else {
    typingThen(() => {
      addBotMsg("I'm best at movie recommendations! Try telling me a genre like <strong>action</strong> or <strong>comedy</strong>, or tap a button below to get started:");
      setTimeout(() => addOptions(["🎬 Action", "😂 Comedy", "🎭 Drama", "👻 Horror", "🚀 Sci-Fi"], handleGenre), 300);
    });
  }
}

userInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleFreeText(); });

// Kick off
startChat();
</script>
